services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD", "nc", "-nz", "127.0.0.1", "2181"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 40s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # Init container to ensure topic exists before services start
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      bash -c "kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic equipment-events --partitions 3 --replication-factor 1"

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - tsdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  cv_service:
    build:
      context: ./cv_service
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      - TORCH_WEIGHTS_ONLY=false
    volumes:
      - ./cv_service/data:/app/data

  analytics_service:
    restart: on-failure
    build:
      context: ./analytics_service
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      timescaledb:
        condition: service_healthy
      cv_service:
        condition: service_started
    env_file: .env

  dashboard:
    build:
      context: .
      dockerfile: ./dashboard/Dockerfile
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      analytics_service:
        condition: service_started
      cv_service:
        condition: service_started
    env_file: .env
    ports:
      - "8501:8501"

volumes:
  tsdb_data: